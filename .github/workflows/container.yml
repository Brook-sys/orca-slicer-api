name: Publish Container

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ORCA_VERSION: 2.4.1

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=orca${{ env.ORCA_VERSION }},enable={{is_default_branch}}
            type=raw,value={{tag}}-orca${{ env.ORCA_VERSION }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ORCA_VERSION=${{ env.ORCA_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger container update webhook
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'pull_request' && secrets.CONTAINER_WEBHOOK_URL != ''
        run: |
          curl --fail --silent --show-error --request POST "${{ secrets.CONTAINER_WEBHOOK_URL }}"
